name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-notarize-release:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select latest Xcode 16 (Swift 6)
        run: |
          LATEST=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1 || true)
          if [ -n "$LATEST" ]; then
            sudo xcode-select -s "$LATEST"
            echo "✅ 使用 $LATEST"
          else
            echo "🔸 找不到 Xcode 16，沿用預設工具鏈"
          fi
          swift --version

      - name: Setup Developer ID signing
        run: |
          CERT_BASE64="${{ secrets.DEVELOPER_CERTIFICATE_BASE64 }}"
          CERT_PASSWORD="${{ secrets.CERTIFICATE_PASSWORD }}"

          if [ -z "$CERT_BASE64" ]; then
            echo "SIGNING_IDENTITY=" >> "$GITHUB_ENV"
            echo "🔸 未設定 Developer ID 憑證，將使用 ad-hoc 簽名"
            exit 0
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo "$CERT_BASE64" | base64 -d > "$RUNNER_TEMP/certificate.p12"

          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH" >/dev/null 2>&1 || true

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID" | head -1 | grep -oE '[A-F0-9]{40}' || true)
          if [ -z "$IDENTITY" ]; then
            echo "SIGNING_IDENTITY=" >> "$GITHUB_ENV"
            echo "⚠️ 找不到 Developer ID 憑證，將使用 ad-hoc 簽名"
            exit 0
          fi

          echo "SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "✅ Developer ID: $IDENTITY"

      - name: Set version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          /usr/libexec/PlistBuddy -c "Set CFBundleShortVersionString $VERSION" Sources/JapaneseLearningCard/Info.plist
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "✅ 版本設為 $VERSION（取自 tag $GITHUB_REF_NAME）"

      - name: Setup provisioning profile
        if: ${{ env.SIGNING_IDENTITY != '' }}
        run: |
          PP_BASE64="${{ secrets.DEVELOPER_PROVISIONING_PROFILE_BASE64 }}"
          if [ -n "$PP_BASE64" ]; then
            echo "$PP_BASE64" | base64 -d > "JapaneseLearningCard_DeveloperID.provisionprofile"
            echo "✅ Provisioning profile 已就緒"
          else
            echo "⚠️ 未設定 DEVELOPER_PROVISIONING_PROFILE_BASE64 secret"
          fi

      - name: Build .app and DMG
        run: |
          chmod +x build-app.sh
          ./build-app.sh

      - name: Notarize and staple DMG
        if: ${{ env.SIGNING_IDENTITY != '' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_APP_PASSWORD" ] || [ -z "$APPLE_TEAM_ID" ]; then
            echo "⚠️ 未設定公證 secrets（APPLE_ID / APPLE_APP_PASSWORD / APPLE_TEAM_ID），略過公證"
            exit 0
          fi

          DMG=".build/app/JapaneseLearningCard.dmg"

          echo "▸ 送交 Apple 公證..."
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          echo "▸ staple DMG..."
          xcrun stapler staple "$DMG"

          echo "▸ 驗證 Gatekeeper..."
          spctl --assess --type open --context context:primary-signature -v "$DMG" || true

      - name: Create Release and Upload DMG
        uses: softprops/action-gh-release@v3
        with:
          name: "v${{ steps.version.outputs.version }}"
          files: .build/app/JapaneseLearningCard.dmg
          generate_release_notes: true

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "${SIGNING_IDENTITY:-}" ]; then
            security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true
          fi
